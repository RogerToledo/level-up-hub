version: 2

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - unparam
    - unconvert
    - prealloc

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  govet:
    check-shadowing: true
  
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
      - name: var-naming
        severity: warning
        disabled: false
      - name: package-comments
        severity: warning
        disabled: true

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - paramTypeCombine
      - unnamedResult

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    - path: internal/mocks/
      linters:
        - all
    - path: internal/account/service_test\.go
      linters:
        - all

  max-issues-per-linter: 50
  max-same-issues: 3

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - docs
    - scripts
  skip-files:
    - ".*\\.pb\\.go$"
