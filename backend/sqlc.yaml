version: "2"
sql:
  - schema: "db/migrations/*.sql"
    queries: "db/queries/*.sql"
    engine: "postgresql"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true

        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"